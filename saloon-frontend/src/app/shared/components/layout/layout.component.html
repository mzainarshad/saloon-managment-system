<div class="app-shell" [class.sidebar-collapsed]="!sidebarOpen">
  <!-- Mobile Overlay -->
  <div class="mobile-overlay" [class.active]="mobileOpen" (click)="mobileOpen=false"></div>

  <!-- Sidebar -->
  <aside class="sidebar" [class.mobile-open]="mobileOpen">
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-icon">✂</span>
        <span class="logo-text" *ngIf="sidebarOpen">SalonPro</span>
      </div>
      <button class="toggle-btn" (click)="sidebarOpen=!sidebarOpen">
        <mat-icon>{{sidebarOpen ? 'chevron_left' : 'chevron_right'}}</mat-icon>
      </button>
    </div>

    <nav class="sidebar-nav">
      <ng-container *ngFor="let item of navItems">
        <!-- Simple item -->
        <a *ngIf="item.route && !item.children" [routerLink]="item.route"
           class="nav-item" [class.active]="isActive(item)" (click)="mobileOpen=false">
          <mat-icon class="nav-icon">{{item.icon}}</mat-icon>
          <span class="nav-label" *ngIf="sidebarOpen">{{item.label}}</span>
        </a>
        <!-- Expandable item -->
        <div *ngIf="item.children" class="nav-group">
          <button class="nav-item nav-group-trigger" [class.active]="isActive(item)"
                  (click)="toggleMenu(item.label)">
            <mat-icon class="nav-icon">{{item.icon}}</mat-icon>
            <span class="nav-label" *ngIf="sidebarOpen">{{item.label}}</span>
            <mat-icon class="expand-icon" *ngIf="sidebarOpen">
              {{expandedMenu === item.label ? 'expand_less' : 'expand_more'}}
            </mat-icon>
          </button>
          <div class="nav-children" *ngIf="sidebarOpen && expandedMenu === item.label">
            <a *ngFor="let child of item.children" [routerLink]="child.route"
               class="nav-child" routerLinkActive="active" (click)="mobileOpen=false">
              <span class="child-dot">•</span>
              {{child.label}}
            </a>
          </div>
        </div>
      </ng-container>
    </nav>

    <div class="sidebar-footer" *ngIf="sidebarOpen">
      <div class="user-info">
        <div class="user-avatar">{{getInitials(currentUser)}}</div>
        <div class="user-details">
          <div class="user-name">{{currentUser?.first_name}} {{currentUser?.last_name}}</div>
          <div class="user-role">{{currentUser?.role | titlecase}}</div>
        </div>
      </div>
      <button class="logout-btn" (click)="logout()">
        <mat-icon>logout</mat-icon>
      </button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main-wrapper">
    <!-- Header -->
    <header class="top-header">
      <div class="header-left">
        <button class="menu-btn" (click)="mobileOpen=true">
          <mat-icon>menu</mat-icon>
        </button>
        <h2 class="branch-name">JohnTownBranch</h2>
      </div>
      <div class="header-right">
        <div class="online-badge"><span class="online-dot"></span> Online</div>
        <button class="icon-btn"><mat-icon>notifications_none</mat-icon></button>
        <div class="header-avatar" [routerLink]="'/settings'">{{getInitials(currentUser)}}</div>
      </div>
    </header>

    <!-- Content -->
    <main class="main-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
