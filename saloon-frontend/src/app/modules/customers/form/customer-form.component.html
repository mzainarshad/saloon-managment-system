<div class="page-header">
  <div><h1>{{isEdit ? 'Edit Customer' : 'Add Customer'}}</h1></div>
  <a class="btn btn-secondary btn-sm" routerLink="/customers">← Back</a>
</div>
<div class="card" style="max-width:600px;">
  <div *ngIf="loading" class="loading-overlay"><svg class="spinner" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10" stroke-dasharray="32" stroke-dashoffset="8" opacity="0.3"/><path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"/></svg></div>
  <form *ngIf="!loading" [formGroup]="form" (ngSubmit)="save()">
    <div class="grid-2" style="gap:16px;">
      <div class="form-group">
        <label class="form-label">Full Name *</label>
        <input class="form-control" formControlName="name" placeholder="e.g. Sarah Khan">
      </div>
      <div class="form-group">
        <label class="form-label">Phone Number *</label>
        <input class="form-control" formControlName="phone" placeholder="+92 300 0000000">
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-control" type="email" formControlName="email" placeholder="sarah@example.com">
      </div>
      <div class="form-group">
        <label class="form-label">Date of Birth</label>
        <input class="form-control" type="date" formControlName="date_of_birth">
      </div>
      <div class="form-group">
        <label class="form-label">Gender</label>
        <select class="form-control" formControlName="gender">
          <option value="">Select...</option>
          <option value="female">Female</option>
          <option value="male">Male</option>
          <option value="other">Other</option>
        </select>
      </div>
    </div>
    <div class="form-group" style="margin-top:16px;">
      <label class="form-label">Notes</label>
      <textarea class="form-control" formControlName="notes" rows="3" placeholder="Preferences, allergies, etc."></textarea>
    </div>
    <div style="display:flex;gap:12px;margin-top:24px;">
      <button type="submit" class="btn btn-primary" [disabled]="saving">{{saving ? 'Saving...' : (isEdit ? 'Update Customer' : 'Add Customer')}}</button>
      <a class="btn btn-secondary" routerLink="/customers">Cancel</a>
    </div>
  </form>
</div>
