<div class="page-header">
  <div><h1>{{isEdit ? 'Edit Product' : 'Add Product'}}</h1><p>Manage product details and stock</p></div>
  <a class="btn btn-secondary btn-sm" routerLink="/products">← Back</a>
</div>
<div class="card" style="max-width:600px;">
  <div *ngIf="loading" class="loading-overlay"><svg class="spinner" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10" stroke-dasharray="32" stroke-dashoffset="8" opacity="0.3"/><path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"/></svg></div>
  <form *ngIf="!loading" [formGroup]="form" (ngSubmit)="save()">
    <div class="grid-2" style="gap:16px;">
      <div class="form-group" style="grid-column:span 2;">
        <label class="form-label">Product Name *</label>
        <input class="form-control" formControlName="name" placeholder="e.g. Moroccan Argan Oil Shampoo">
      </div>
      <div class="form-group">
        <label class="form-label">SKU</label>
        <input class="form-control" formControlName="sku" placeholder="e.g. SHAMP-001">
      </div>
      <div class="form-group">
        <label class="form-label">Min Stock Alert</label>
        <input class="form-control" type="number" formControlName="min_stock_threshold" min="0">
      </div>
      <div class="form-group">
        <label class="form-label">Cost Price (Rs.) *</label>
        <input class="form-control" type="number" formControlName="cost_price" min="0" step="0.01">
      </div>
      <div class="form-group">
        <label class="form-label">Retail Price (Rs.) *</label>
        <input class="form-control" type="number" formControlName="retail_price" min="0" step="0.01">
      </div>
      <div class="form-group">
        <label class="form-label">Current Stock (units)</label>
        <input class="form-control" type="number" formControlName="stock_qty" min="0">
      </div>
      <div class="form-group" style="align-self:end;">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
          <input type="checkbox" formControlName="is_active">
          <span class="form-label" style="margin:0;">Active</span>
        </label>
      </div>
    </div>
    <div class="form-group" style="margin-top:16px;">
      <label class="form-label">Description</label>
      <textarea class="form-control" formControlName="description" rows="3" placeholder="Product description..."></textarea>
    </div>
    <div style="display:flex;gap:12px;margin-top:24px;">
      <button type="submit" class="btn btn-primary" [disabled]="saving">
        {{saving ? 'Saving...' : (isEdit ? 'Update Product' : 'Add Product')}}
      </button>
      <a class="btn btn-secondary" routerLink="/products">Cancel</a>
    </div>
  </form>
</div>
