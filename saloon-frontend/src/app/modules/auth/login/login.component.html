<div class="login-page">
  <div class="login-left">
    <div class="brand">
      <span class="brand-icon">✂</span>
      <span class="brand-name">SalonPro</span>
    </div>
    <div class="tagline">
      <h1>Manage your salon<br>like a professional.</h1>
      <p>All-in-one platform for appointments, POS, staff, and analytics.</p>
    </div>
    <div class="features">
      <div class="feature-item" *ngFor="let f of ['Appointment Management','Point of Sale','Staff & Payroll','Reports & Analytics']">
        <span class="check">✓</span> {{f}}
      </div>
    </div>
  </div>
  <div class="login-right">
    <div class="login-card">
      <h2>Sign in</h2>
      <p class="subtitle">Enter your credentials to continue</p>

      <div class="error-msg" *ngIf="error">{{error}}</div>

      <div class="form-group" style="margin-top:24px;">
        <label class="form-label">Email Address</label>
        <input class="form-control" type="email" [(ngModel)]="email" placeholder="admin@salon.com" (keyup.enter)="login()">
      </div>
      <div class="form-group" style="margin-top:16px;">
        <label class="form-label">Password</label>
        <div class="password-wrapper">
          <input class="form-control" [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" placeholder="••••••••" (keyup.enter)="login()">
          <button class="toggle-pw" (click)="showPassword=!showPassword">
            <mat-icon>{{showPassword ? 'visibility_off' : 'visibility'}}</mat-icon>
          </button>
        </div>
      </div>

      <button class="btn btn-primary btn-lg" style="width:100%;margin-top:24px;justify-content:center;" [disabled]="loading" (click)="login()">
        <svg *ngIf="loading" class="spinner" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10" opacity="0.3" stroke-dasharray="32"/><path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"/></svg>
        {{loading ? 'Signing in...' : 'Sign In'}}
      </button>
    </div>
  </div>
</div>
