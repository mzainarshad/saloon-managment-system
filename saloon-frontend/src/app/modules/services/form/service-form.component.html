<div class="page-header">
  <div><h1>{{isEdit ? 'Edit Service' : 'Add Service'}}</h1></div>
  <a class="btn btn-secondary btn-sm" routerLink="/services">← Back</a>
</div>
<div class="card" style="max-width:600px;">
  <form [formGroup]="form" (ngSubmit)="save()">
    <div class="grid-2" style="gap:16px;">
      <div class="form-group" style="grid-column:span 2;">
        <label class="form-label">Service Name *</label>
        <input class="form-control" formControlName="name" placeholder="e.g. Hair Highlights">
      </div>
      <div class="form-group">
        <label class="form-label">Category</label>
        <select class="form-control" formControlName="category">
          <option value="">No Category</option>
          <option *ngFor="let c of categories" [value]="c.id">{{c.name}}</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Duration (minutes) *</label>
        <input class="form-control" type="number" formControlName="duration_minutes" min="5">
      </div>
      <div class="form-group">
        <label class="form-label">Price (Rs.) *</label>
        <input class="form-control" type="number" formControlName="price" min="0">
      </div>
      <div class="form-group" style="align-self:end;">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
          <input type="checkbox" formControlName="is_active">
          <span class="form-label" style="margin:0;">Active</span>
        </label>
      </div>
    </div>
    <div class="form-group" style="margin-top:16px;">
      <label class="form-label">Description</label>
      <textarea class="form-control" formControlName="description" rows="3"></textarea>
    </div>
    <div style="display:flex;gap:12px;margin-top:24px;">
      <button type="submit" class="btn btn-primary" [disabled]="saving">{{saving ? 'Saving...' : (isEdit ? 'Update' : 'Add Service')}}</button>
      <a class="btn btn-secondary" routerLink="/services">Cancel</a>
    </div>
  </form>
</div>
